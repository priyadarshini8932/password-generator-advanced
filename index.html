<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="main-heading">Generate a </h1>
    <h1 id="main-heading2"> random password</h1>
    
    <p>Never use an insecure password again</p>
    <div class="main-div">
        <button id="btn">Generate passwords</button>
        <div>
        <label class= "values" for="length">Password Length:</label>
            <input type="number" id="length" value="15" min="4" max="30">
        <label>
        </div>
        <div class="toggle-container">
        <label class= "values" >
            Symbols:
            <input type="checkbox" id="symbols-toggle" class="toggle" checked>
        </label>
        </div>
        <div class="toggle-container">
        <label class= "values" >
            Numbers:
            <input type="checkbox" id="number-toggle" class=toggle checked>
        </label>
        </div>
    </div>
    
</div>
    <hr>
    <div class="main">
        <div class="password-box" id="box1"></div>
        <div class="password-box" id="box2"></div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
